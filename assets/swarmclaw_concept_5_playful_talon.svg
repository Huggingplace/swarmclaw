<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Concept 5: The Happy Little Talon -->
  <style>
    .bird-wing { fill: #89B4FA; } /* Sky Blue */
    .bird-claw { fill: #F9E2AF; } /* Warm Yellow */
  </style>

  <!-- Flappy Wings -->
  <path d="M 200 200 Q 150 150 80 180 Q 100 220 150 210 Q 120 250 160 270 Q 180 230 200 220" class="bird-wing" />
  <path d="M 200 200 Q 250 150 320 180 Q 300 220 250 210 Q 280 250 240 270 Q 220 230 200 220" class="bird-wing" />

  <!-- The "Claw" (looks more like a friendly bird foot grabbing the air) -->
  <circle cx="200" cy="220" r="25" class="bird-claw" />
  <path d="M 185 240 L 175 280" stroke="#F9E2AF" stroke-width="10" stroke-linecap="round" />
  <path d="M 200 245 L 200 290" stroke="#F9E2AF" stroke-width="10" stroke-linecap="round" />
  <path d="M 215 240 L 225 280" stroke="#F9E2AF" stroke-width="10" stroke-linecap="round" />
  
  <!-- "Sparkle" of the swarm -->
  <circle cx="100" cy="140" r="5" fill="#89B4FA" opacity="0.6" />
  <circle cx="310" cy="130" r="4" fill="#89B4FA" opacity="0.4" />
  <circle cx="200" cy="80" r="6" fill="#89B4FA" opacity="0.5" />
</svg>